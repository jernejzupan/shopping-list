<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
        /* Sticky nav */
        nav.app-nav {
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--pico-background-color);
            border-bottom: 1px solid var(--pico-muted-border-color);
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-toggles {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .nav-toggles label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Remove Pico's default bottom margin from switch inputs inside nav */
        .nav-toggles input[type="checkbox"] {
            margin: 0;
        }

        .nav-filter input {
            margin: 0;
        }

        /* Full-viewport textarea */
        .raw-textarea {
            width: 100%;
            min-height: calc(100vh - 120px);
            border: none;
            border-radius: 0;
            box-shadow: none;
            resize: none;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            padding: 1rem;
            background: transparent;
            outline: none;
        }

        /* Checked items */
        .checked-item label {
            text-decoration: line-through;
            color: var(--pico-muted-color);
        }

        /* List items */
        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .item-list li {
            display: flex;
            align-items: center;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--pico-muted-border-color);
            gap: 0.6rem;
        }

        .item-list li:last-child {
            border-bottom: none;
        }

        .item-list li input[type="checkbox"] {
            margin: 0;
            flex-shrink: 0;
        }

        .item-list li label {
            margin: 0;
            cursor: pointer;
            flex: 1;
            font-size: 1rem;
        }

        /* Divider between unchecked and checked */
        .list-divider {
            border: none;
            border-top: 2px solid var(--pico-muted-border-color);
            margin: 0;
        }

        /* Empty state */
        .empty-state {
            padding: 2rem 1rem;
            text-align: center;
            color: var(--pico-muted-color);
        }

        /* Main content area */
        main.app-main {
            padding: 0;
            max-width: 640px;
            margin: 0 auto;
        }

        article.list-card {
            margin: 1rem;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- Sticky nav -->
        <nav class="app-nav">
            <div class="nav-toggles">
                <label>
                    <input type="checkbox" role="switch" v-model="textMode" />
                    Text
                </label>
                <label>
                    <input type="checkbox" role="switch" v-model="shoppingMode" />
                    Shopping
                </label>
            </div>
            <div class="nav-filter" v-if="!textMode">
                <input type="search" v-model="filterText" placeholder="Filter items…" aria-label="Filter items" />
            </div>
        </nav>

        <main class="app-main">
            <article class="list-card">

                <!-- Text mode: single textarea -->
                <template v-if="textMode">
                    <textarea class="raw-textarea" v-model="draftText" placeholder="- [ ] item one&#10;- [x] item two"
                        spellcheck="false"></textarea>
                </template>

                <!-- Checkbox mode -->
                <template v-else>

                    <p class="empty-state" v-if="items.length === 0">
                        No items yet — switch to Text mode to add some.
                    </p>

                    <template v-else>
                        <!-- Unchecked list -->
                        <ul class="item-list" v-if="filteredUncheckedItems.length > 0">
                            <li v-for="item in filteredUncheckedItems" :key="item.id">
                                <input type="checkbox" :id="'item-' + item.id" :checked="item.checked"
                                    @change="toggleCheck(item)" />
                                <label :for="'item-' + item.id">{{ item.text }}</label>
                            </li>
                        </ul>

                        <!-- Divider -->
                        <hr class="list-divider"
                            v-if="filteredUncheckedItems.length > 0 && filteredCheckedItems.length > 0" />

                        <!-- Checked list -->
                        <ul class="item-list" v-if="filteredCheckedItems.length > 0">
                            <li class="checked-item" v-for="item in filteredCheckedItems" :key="item.id">
                                <input type="checkbox" :id="'item-' + item.id" :checked="item.checked"
                                    @change="toggleCheck(item)" />
                                <label :for="'item-' + item.id">{{ item.text }}</label>
                            </li>
                        </ul>

                        <!-- Filter produced no matches -->
                        <p class="empty-state"
                            v-if="filterText && filteredUncheckedItems.length === 0 && filteredCheckedItems.length === 0">
                            No items match "{{ filterText }}".
                        </p>
                    </template>

                </template>

            </article>
        </main>

    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;
        const STORAGE_KEY = 'sldata';

        createApp({
            data() {
                return {
                    items: [],           // [{ id, text, checked }]
                    textMode: false,
                    shoppingMode: false,
                    filterText: '',      // not persisted
                    draftText: '',       // live textarea content; synced on mode switch
                    _nextId: 1,
                };
            },

            computed: {
                uncheckedItems() {
                    return this.items.filter(i => !i.checked);
                },
                checkedItems() {
                    return this.items.filter(i => i.checked);
                },
                filteredUncheckedItems() {
                    if (!this.filterText) return this.uncheckedItems;
                    const q = this.filterText.toLowerCase();
                    return this.uncheckedItems.filter(i => i.text.toLowerCase().includes(q));
                },
                filteredCheckedItems() {
                    if (!this.filterText) return this.checkedItems;
                    const q = this.filterText.toLowerCase();
                    return this.checkedItems.filter(i => i.text.toLowerCase().includes(q));
                },
            },

            watch: {
                textMode(newVal, oldVal) {
                    if (oldVal === true && newVal === false) {
                        // text → checkbox: parse draft back into items
                        this.parseText(this.draftText);
                    } else if (newVal === true) {
                        // checkbox → text: render current items into draft
                        this.draftText = this.renderText();
                    }
                    this.save();
                },
                shoppingMode() {
                    this.save();
                },
                items: {
                    deep: true,
                    handler() {
                        this.save();
                    },
                },
            },

            methods: {
                /* ── Check toggling ── */
                toggleCheck(item) {
                    const idx = this.items.findIndex(i => i.id === item.id);
                    if (idx === -1) return;

                    this.items[idx].checked = !this.items[idx].checked;
                    const nowChecked = this.items[idx].checked;

                    if (this.shoppingMode && nowChecked) {
                        // Move item to just before the first remaining unchecked item
                        const insertIdx = this.items.findIndex(i => !i.checked);
                        if (insertIdx !== -1 && insertIdx !== idx) {
                            const [moved] = this.items.splice(idx, 1);
                            this.items.splice(insertIdx, 0, moved);
                        }
                    }
                    // Unchecking never changes order.
                    this.save();
                },

                /* ── Text ↔ items conversion ── */
                renderText() {
                    return this.items
                        .map(i => (i.checked ? '- [x] ' : '- [ ] ') + i.text)
                        .join('\n');
                },

                parseText(raw) {
                    const checkedRe = /^- \[x\] (.*)$/i;
                    const uncheckedRe = /^- \[ \] (.*)$/;
                    const newItems = [];
                    for (const line of raw.split('\n')) {
                        const trimmed = line.trimEnd();
                        if (trimmed === '') continue;
                        let checked = false;
                        let text = trimmed;
                        const cm = trimmed.match(checkedRe);
                        const um = trimmed.match(uncheckedRe);
                        if (cm) { checked = true; text = cm[1]; }
                        else if (um) { checked = false; text = um[1]; }
                        // Reuse existing id if text matches, otherwise assign new
                        const existing = this.items.find(i => i.text === text);
                        newItems.push({
                            id: existing ? existing.id : this._nextId++,
                            text,
                            checked,
                        });
                    }
                    this.items = newItems;
                },

                /* ── Persistence ── */
                save() {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        items: this.items,
                        textMode: this.textMode,
                        shoppingMode: this.shoppingMode,
                        nextId: this._nextId,
                        // Always store the rendered form so a refresh in text mode works
                        draftText: this.textMode ? this.draftText : this.renderText(),
                    }));
                },

                load() {
                    try {
                        const raw = localStorage.getItem(STORAGE_KEY);
                        if (!raw) return;
                        const data = JSON.parse(raw);
                        this.items = data.items ?? [];
                        this.textMode = data.textMode ?? false;
                        this.shoppingMode = data.shoppingMode ?? false;
                        this._nextId = data.nextId ?? (this.items.length + 1);
                        this.draftText = this.textMode
                            ? (data.draftText ?? this.renderText())
                            : this.renderText();
                    } catch (e) {
                        console.warn('Failed to load from localStorage', e);
                    }
                },
            },

            created() {
                this.load();
            },
        }).mount('#app');
    </script>
</body>

</html>
