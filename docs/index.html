<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shopping List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* styles moved to style.css */
    </style>
</head>

<body>
    <div id="app">

        <!-- Sticky nav -->
        <nav class="app-nav">
            <div class="nav-toggles">
                <button type="button" class="nav-mode-btn" :class="{active: shoppingMode}"
                    @click="shoppingMode = !shoppingMode"><i class="fa-solid fa-cart-shopping"></i></button>
                <button type="button" class="nav-mode-btn" :class="{active: textMode}"
                    @click="textMode = !textMode">T</button>
                <button type="button" class="nav-mode-btn" :class="{active: priceViewMode}"
                    @click="togglePriceView()">$</button>
                <select class="nav-store-select" v-model="selectedStore" aria-label="Store">
                    <option v-for="s in storeOptions" :key="s" :value="s">{{ s }}</option>
                </select>
                <div class="nav-menu-wrapper">
                    <button type="button" class="nav-mode-btn" aria-label="Menu" @click.stop="menuOpen = !menuOpen">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="nav-menu-dropdown" v-if="menuOpen" @click.stop>
                        <button type="button" @click="uncheckAll()">
                            <i class="fa-regular fa-square"></i> Uncheck all
                        </button>
                        <button type="button" @click="copyAllData()">
                            <i class="fa-regular fa-copy"></i> Copy all data
                        </button>
                    </div>
                </div>
            </div>
            <div class="nav-filter" v-if="!textMode && !priceViewMode">
                <input type="search" v-model="filterText" placeholder="Filter items…" aria-label="Filter items" />
            </div>
        </nav>

        <main class="app-main">
            <article class="list-card">

                <!-- Text mode: single textarea -->
                <template v-if="textMode">
                    <textarea class="raw-textarea" v-model="draftText" placeholder="- [ ] item one&#10;- [x] item two"
                        spellcheck="false"></textarea>
                </template>

                <!-- Price view mode: editable textarea for import/export -->
                <template v-else-if="priceViewMode">
                    <textarea class="raw-textarea" v-model="priceViewEditText"
                        placeholder="- apples&#10;  - 2026-03-28 spar 10€/1kg note&#10;- milk&#10;  - 2026-03-27 lidl 1.5€/1l"
                        spellcheck="false"></textarea>
                </template>

                <!-- Checkbox mode -->
                <template v-else>

                    <p class="empty-state" v-if="items.length === 0">
                        No items yet — switch to Text mode to add some.
                    </p>

                    <template v-else>
                        <!-- Unchecked list -->
                        <ul class="item-list" v-if="filteredUncheckedItems.length > 0">
                            <li v-for="item in filteredUncheckedItems" :key="item.id"
                                :class="{'selected-item': selectedItemId === item.id}">
                                <span class="select-indicator" v-if="selectedItemId === item.id">::</span>
                                <input type="checkbox" :id="'chk-' + item.id" :checked="item.checked"
                                    @change="toggleCheck(item)" />
                                <!-- Inline edit input -->
                                <input v-if="editingItemId === item.id" class="item-edit-input" :id="'edit-' + item.id"
                                    v-model="editDraft" @blur="commitEdit(item)" @keyup.enter="commitEdit(item)"
                                    @keyup.escape="cancelEdit(item)" />
                                <!-- Label (tap to select, hold to edit) -->
                                <span v-else class="item-label" @pointerdown="onItemPointerDown(item, $event)"
                                    @pointerup="onItemPointerUp(item)" @pointermove="onItemPointerMove()"
                                    @pointercancel="onItemPointerCancel()">
                                    <span class="item-qty" v-if="itemQty(item.text)">{{ itemQty(item.text) }}</span>
                                    <span>{{ itemName(item.text) }}</span>
                                </span>
                                <!-- Price display only (no action buttons) -->
                                <div class="item-toolbar" v-if="shoppingMode && itemPriceDisplay(item.text)">
                                    <span class="item-price">{{ itemPriceDisplay(item.text) }}</span>
                                </div>
                            </li>
                        </ul>

                        <!-- Divider -->
                        <hr class="list-divider"
                            v-if="filteredUncheckedItems.length > 0 && filteredCheckedItems.length > 0" />

                        <!-- Checked list -->
                        <ul class="item-list" v-if="filteredCheckedItems.length > 0">
                            <li class="checked-item" v-for="item in filteredCheckedItems" :key="item.id"
                                :class="{'selected-item': selectedItemId === item.id}">
                                <span class="select-indicator" v-if="selectedItemId === item.id">::</span>
                                <input type="checkbox" :id="'chk-' + item.id" :checked="item.checked"
                                    @change="toggleCheck(item)" />
                                <!-- Inline edit input -->
                                <input v-if="editingItemId === item.id" class="item-edit-input" :id="'edit-' + item.id"
                                    v-model="editDraft" @blur="commitEdit(item)" @keyup.enter="commitEdit(item)"
                                    @keyup.escape="cancelEdit(item)" />
                                <!-- Label (tap to select, hold to edit) -->
                                <span v-else class="item-label" @pointerdown="onItemPointerDown(item, $event)"
                                    @pointerup="onItemPointerUp(item)" @pointermove="onItemPointerMove()"
                                    @pointercancel="onItemPointerCancel()">
                                    <span class="item-qty" v-if="itemQty(item.text)">{{ itemQty(item.text) }}</span>
                                    <span>{{ itemName(item.text) }}</span>
                                </span>
                                <!-- Price display only (no action buttons) -->
                                <div class="item-toolbar" v-if="shoppingMode && itemPriceDisplay(item.text)">
                                    <span class="item-price">{{ itemPriceDisplay(item.text) }}</span>
                                </div>
                            </li>
                        </ul>

                        <!-- Filter produced no matches -->
                        <p class="empty-state"
                            v-if="filterText && filteredUncheckedItems.length === 0 && filteredCheckedItems.length === 0">
                            No items match "{{ filterText }}".
                        </p>
                    </template>

                </template>

            </article>
        </main>

        <!-- Fixed bottom toolbar (checkbox mode only) -->
        <nav class="bottom-toolbar" v-if="!textMode && !priceViewMode">
            <div class="bottom-toolbar-left">
                <button type="button" class="icon-btn" title="Increase quantity" :disabled="!selectedItem"
                    @click="selectedItem && adjustQty(selectedItem, 1)">
                    <i class="fa-solid fa-plus"></i>
                </button>
                <button type="button" class="icon-btn" title="Decrease quantity" :disabled="!selectedItem"
                    @click="selectedItem && adjustQty(selectedItem, -1)">
                    <i class="fa-solid fa-minus"></i>
                </button>
                <button type="button" class="icon-btn" title="Move up" :disabled="!selectedItem"
                    @click="selectedItem && moveUp(selectedItem)">
                    <i class="fa-solid fa-caret-up"></i>
                </button>
                <button type="button" class="icon-btn" title="Move down" :disabled="!selectedItem"
                    @click="selectedItem && moveDown(selectedItem)">
                    <i class="fa-solid fa-caret-down"></i>
                </button>
                <button type="button" class="icon-btn price-btn" title="Price history"
                    :disabled="!selectedItem || !shoppingMode" @click="selectedItem && openPriceModal(selectedItem)">
                    <i class="fa-solid fa-calculator"></i>
                </button>
                <button type="button" class="icon-btn" title="Undo" :disabled="undoStack.length === 0" @click="undo()">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                </button>
            </div>
            <div class="bottom-toolbar-right">
                <button type="button" class="icon-btn" title="Add item after selected" @click="addItemAfterSelected()">
                    <i class="fa-solid fa-circle-plus"></i>
                </button>
                <button type="button" class="icon-btn danger" title="Delete selected" :disabled="!selectedItem"
                    @click="deleteSelectedItem()">
                    <i class="fa-solid fa-trash"></i>
                </button>
            </div>
        </nav>

        <!-- Price calculator modal -->
        <dialog :open="priceModalItem !== null" @click.self="closePriceModal()">
            <article>
                <header>
                    <button class="close" aria-label="Close" @click="closePriceModal()"></button>
                    <p><strong>Price: {{ priceModalItem }}</strong></p>
                </header>

                <!-- Add entry form -->
                <div class="price-add-form">
                    <input type="date" v-model="priceForm.date" />
                    <select v-model="priceForm.store">
                        <option v-for="s in storeOptions" :key="s" :value="s">{{ s }}</option>
                    </select>
                    <input type="text" v-model="priceForm.raw" placeholder="5/1kg" spellcheck="false"
                        @keyup.enter="addPriceEntry()" :readonly="isMobile" />
                    <span v-if="priceFormNormalized" class="price-form-preview">= {{ priceFormNormalized }}</span>
                    <input type="text" class="price-info-input" v-model="priceForm.info" placeholder="note…"
                        @keyup.enter="addPriceEntry()" />
                    <button type="button" @click="addPriceEntry()"><i class="fa-solid fa-plus"></i></button>
                </div>

                <!-- Numpad -->
                <div class="price-numpad">
                    <button type="button" @click="numpadInput('7')">7</button>
                    <button type="button" @click="numpadInput('8')">8</button>
                    <button type="button" @click="numpadInput('9')">9</button>
                    <button type="button" @click="numpadInput('/')">/</button>
                    <button type="button" @click="numpadInput('4')">4</button>
                    <button type="button" @click="numpadInput('5')">5</button>
                    <button type="button" @click="numpadInput('6')">6</button>
                    <button type="button" @click="numpadUnit('g')">g</button>
                    <button type="button" @click="numpadInput('1')">1</button>
                    <button type="button" @click="numpadInput('2')">2</button>
                    <button type="button" @click="numpadInput('3')">3</button>
                    <button type="button" @click="numpadUnit('kg')">kg</button>
                    <button type="button" @click="numpadInput('0')">0</button>
                    <button type="button" @click="numpadInput('.')">.</button>
                    <button type="button" class="numpad-del" @click="numpadDel()">DEL</button>
                    <button type="button" @click="numpadUnit('l')">l</button>
                    <button type="button" class="numpad-clr" @click="priceForm.raw = ''">CLR</button>
                    <button type="button" @click="numpadUnit('ml')">ml</button>
                    <button type="button" class="numpad-enter" @click="addPriceEntry()">ENTER</button>
                </div>

                <!-- Entry list -->
                <ul class="price-entry-list" v-if="currentPriceEntries.length > 0">
                    <li v-for="(entry, idx) in currentPriceEntries" :key="idx">
                        <span class="price-entry-date">{{ entry.date }}</span>
                        <span class="price-entry-store" v-if="entry.store">{{ entry.store }}</span>
                        <span class="price-entry-value">{{ entry.price }}€/{{ entry.amount }}{{ entry.amountUnit || ''
                            }}</span>
                        <span v-if="entryNormalized(entry)" class="price-entry-normalized">= {{ entryNormalized(entry)
                            }}</span>
                        <span v-if="entry.info" class="price-entry-info">{{ entry.info }}</span>
                        <span class="price-entry-spacer"></span>
                        <button type="button" class="icon-btn" title="Delete" @click="deletePriceEntry(idx)">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </li>
                </ul>
                <p v-else class="empty-state" style="padding:0.5rem 0">No entries yet.</p>

                <footer>
                    <button @click="closePriceModal()">Close</button>
                </footer>
            </article>
        </dialog>

    </div>

    <script type="module" src="app.js"></script>
</body>


</html>
