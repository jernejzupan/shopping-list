<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping List</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #202020;
            min-height: 100vh;
        }

        #app {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px;
        }

        /* ── Toggle row ── */
        .toggles {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            align-items: center;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }

        .toggle-label input[type="checkbox"] {
            display: none;
        }

        .pill {
            position: relative;
            width: 40px;
            height: 22px;
            background: #ccc;
            border-radius: 11px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .pill::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
            box-shadow: 0 1px 3px rgba(0, 0, 0, .3);
        }

        .toggle-label input:checked+.pill {
            background: #4a90d9;
        }

        .toggle-label input:checked+.pill::after {
            transform: translateX(18px);
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .12);
            overflow: hidden;
        }

        /* ── Textarea (text mode) ── */
        .raw-textarea {
            width: 100%;
            min-height: 320px;
            padding: 16px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 14px;
            line-height: 1.6;
            border: none;
            outline: none;
            resize: vertical;
            color: #202020;
            background: transparent;
        }

        /* ── Checkbox lists ── */
        .item-list {
            list-style: none;
        }

        .item-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.1s;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .item-row:hover {
            background: #fafafa;
        }

        .item-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4a90d9;
            cursor: pointer;
            flex-shrink: 0;
        }

        .item-text {
            font-size: 15px;
            line-height: 1.4;
            flex: 1;
        }

        /* ── Checked section ── */
        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 0;
        }

        .checked-section .item-text {
            text-decoration: line-through;
            color: #999;
        }

        .checked-section .item-row:hover {
            background: #fafafa;
        }

        /* ── Empty state ── */
        .empty {
            padding: 32px 16px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="app">

        <!-- Toggle row -->
        <div class="toggles">
            <label class="toggle-label">
                <input type="checkbox" v-model="textMode" />
                <span class="pill"></span>
                Text
            </label>
            <label class="toggle-label">
                <input type="checkbox" v-model="shoppingMode" />
                <span class="pill"></span>
                Shopping
            </label>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- Text mode: single textarea -->
            <template v-if="textMode">
                <textarea class="raw-textarea" v-model="draftText" placeholder="- [ ] item one&#10;- [x] item two"
                    spellcheck="false"></textarea>
            </template>

            <!-- Checkbox mode -->
            <template v-else>

                <!-- Empty state -->
                <div v-if="items.length === 0" class="empty">No items yet — switch to Text mode to add some.</div>

                <!-- Unchecked list -->
                <ul class="item-list unchecked-section" v-if="uncheckedItems.length > 0">
                    <li class="item-row" v-for="item in uncheckedItems" :key="item.id">
                        <input type="checkbox" :checked="item.checked" @change="toggleCheck(item)" />
                        <span class="item-text">{{ item.text }}</span>
                    </li>
                </ul>

                <!-- Divider -->
                <div class="divider" v-if="uncheckedItems.length > 0 && checkedItems.length > 0"></div>

                <!-- Checked list -->
                <ul class="item-list checked-section" v-if="checkedItems.length > 0">
                    <li class="item-row" v-for="item in checkedItems" :key="item.id">
                        <input type="checkbox" :checked="item.checked" @change="toggleCheck(item)" />
                        <span class="item-text">{{ item.text }}</span>
                    </li>
                </ul>

            </template>

        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;

        const STORAGE_KEY = 'sldata';

        createApp({
            data() {
                return {
                    items: [],          // [{ id, text, checked }]
                    textMode: false,
                    shoppingMode: false,
                    draftText: '',      // live-bound textarea content; synced on mode switch
                    _nextId: 1,
                };
            },

            computed: {
                uncheckedItems() {
                    return this.items.filter(i => !i.checked);
                },
                checkedItems() {
                    return this.items.filter(i => i.checked);
                },
            },

            watch: {
                textMode(newVal, oldVal) {
                    if (oldVal === true && newVal === false) {
                        // text → checkbox: parse draft back into items
                        this.parseText(this.draftText);
                    } else if (newVal === true) {
                        // checkbox → text: render items into draft
                        this.draftText = this.renderText();
                    }
                    this.save();
                },
                shoppingMode() {
                    this.save();
                },
                items: {
                    deep: true,
                    handler() {
                        this.save();
                    },
                },
            },

            methods: {
                /* ── Check toggling ── */
                toggleCheck(item) {
                    const idx = this.items.findIndex(i => i.id === item.id);
                    if (idx === -1) return;

                    this.items[idx].checked = !this.items[idx].checked;
                    const nowChecked = this.items[idx].checked;

                    if (this.shoppingMode && nowChecked) {
                        // Find the index of the first unchecked item (in the updated array)
                        const insertIdx = this.items.findIndex(i => !i.checked);
                        if (insertIdx !== -1 && insertIdx !== idx) {
                            // Move item to insertIdx
                            const [moved] = this.items.splice(idx, 1);
                            this.items.splice(insertIdx, 0, moved);
                        }
                    }
                    // Unchecking never changes order — nothing extra to do.
                    this.save();
                },

                /* ── Text ↔ items conversion ── */
                renderText() {
                    return this.items
                        .map(i => (i.checked ? '- [x] ' : '- [ ] ') + i.text)
                        .join('\n');
                },

                parseText(raw) {
                    const checkedRe = /^- \[x\] (.*)$/i;
                    const uncheckedRe = /^- \[ \] (.*)$/;
                    const lines = raw.split('\n');
                    const newItems = [];
                    for (const line of lines) {
                        const trimmed = line.trimEnd();
                        if (trimmed === '') continue;
                        let checked = false;
                        let text = trimmed;
                        const cm = trimmed.match(checkedRe);
                        const um = trimmed.match(uncheckedRe);
                        if (cm) {
                            checked = true;
                            text = cm[1];
                        } else if (um) {
                            checked = false;
                            text = um[1];
                        }
                        // Preserve id if same text+checked already exists, otherwise assign new
                        const existing = this.items.find(i => i.text === text);
                        newItems.push({
                            id: existing ? existing.id : this._nextId++,
                            text,
                            checked,
                        });
                    }
                    this.items = newItems;
                },

                /* ── Persistence ── */
                save() {
                    const payload = {
                        items: this.items,
                        textMode: this.textMode,
                        shoppingMode: this.shoppingMode,
                        nextId: this._nextId,
                        // Store the draft so text survives a refresh while in text mode
                        draftText: this.textMode ? this.draftText : this.renderText(),
                    };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
                },

                load() {
                    try {
                        const raw = localStorage.getItem(STORAGE_KEY);
                        if (!raw) return;
                        const data = JSON.parse(raw);
                        this.items = data.items ?? [];
                        this.textMode = data.textMode ?? false;
                        this.shoppingMode = data.shoppingMode ?? false;
                        this._nextId = data.nextId ?? (this.items.length + 1);
                        if (this.textMode) {
                            this.draftText = data.draftText ?? this.renderText();
                        } else {
                            this.draftText = this.renderText();
                        }
                    } catch (e) {
                        console.warn('Failed to load from localStorage', e);
                    }
                },
            },

            created() {
                this.load();
            },
        }).mount('#app');
    </script>
</body>

</html>
